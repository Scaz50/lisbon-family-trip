<style>
:root{--ink:#17302e;--muted:#5a6865;--paper:#f7f2e9;--cream:#fffaf2;--green:#173d3a;--sage:#dce7de;--coral:#e87452;--gold:#d2a24b;--line:rgba(23,48,46,.14);--shadow:0 22px 70px rgba(31,49,45,.12);--serif:"Fraunces",Georgia,serif;--sans:"DM Sans","Segoe UI",sans-serif}
*{box-sizing:border-box}
body{margin:0;color:var(--ink);background:var(--paper);font-family:var(--sans);line-height:1.55}
button,a{font:inherit}a{color:inherit}
.shell{width:min(1240px,calc(100% - 48px));margin:auto}
.topbar{position:sticky;top:0;z-index:30;background:rgba(247,242,233,.88);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}
.topbar .shell{min-height:64px;display:flex;align-items:center;justify-content:space-between;gap:20px}
.brand{font-family:var(--serif);font-size:20px;text-decoration:none}
.pill{border:1px solid var(--line);background:rgba(255,255,255,.6);border-radius:999px;padding:9px 14px;text-decoration:none;cursor:pointer;transition:.2s ease;white-space:nowrap}
.pill:hover{background:#fff}
.eyebrow{text-transform:uppercase;letter-spacing:.18em;font-size:12px;font-weight:600}
/* Hero */
.hero{min-height:560px;position:relative;display:grid;align-items:end;color:#fff;overflow:hidden;background:#244e49}
.hero-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.hero::before{content:"";position:absolute;inset:0;background:linear-gradient(0deg,rgba(12,38,35,.78),rgba(12,38,35,.12) 55%,rgba(12,38,35,.18));z-index:1}
.hero::after{content:"";position:absolute;inset:auto 0 0;height:7px;background:linear-gradient(90deg,var(--coral) 0 35%,var(--gold) 35% 62%,#8bb5a4 62%);z-index:2}
.hero-inner{position:relative;z-index:2;padding:120px 0 64px;max-width:880px}
.hero .eyebrow{color:#fbd9a8}
.hero h1{font-family:var(--serif);font-weight:500;font-size:clamp(44px,6.5vw,82px);line-height:.98;margin:14px 0 18px}
.hero-deck{font-size:clamp(16px,2vw,21px);max-width:700px;color:rgba(255,255,255,.9);margin:0}
.hero-meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:30px}
.hero-meta span{border:1px solid rgba(255,255,255,.28);background:rgba(255,255,255,.12);padding:8px 13px;border-radius:999px;backdrop-filter:blur(10px);font-size:14px}
/* Sections */
main .shell{padding-top:64px}
.section{margin:0 0 72px}
.section-head{display:flex;justify-content:space-between;gap:28px;align-items:end;margin-bottom:24px}
.section-head h2{font:500 clamp(30px,4vw,46px)/1.05 var(--serif);margin:0}
.section-head p{max-width:460px;margin:0;color:var(--muted)}
.intro-grid{display:grid;grid-template-columns:minmax(0,1.35fr) minmax(270px,.65fr);gap:clamp(32px,6vw,80px);align-items:start;margin-bottom:72px}
.lead{font:500 clamp(26px,3.4vw,44px)/1.14 var(--serif);margin:0}
.actions{display:flex;flex-wrap:wrap;gap:9px;margin-top:26px}
.action{display:inline-flex;align-items:center;gap:8px;text-decoration:none;padding:11px 16px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.55);transition:.2s ease}
.action:hover{background:#fff}
.action.primary{background:var(--green);color:#fff;border-color:var(--green)}
.family-note{border-left:3px solid var(--gold);padding:4px 0 4px 20px;color:var(--muted)}
.family-note strong{display:block;color:var(--ink);margin-bottom:7px;font-size:12px;text-transform:uppercase;letter-spacing:.13em}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:18px}
.chip{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:999px;background:var(--sage);font-size:12px}
.chip.rating{background:#fff0cf}
/* Gallery */
.gallery{display:grid;gap:12px}
.gallery.g3{grid-template-columns:1.35fr .65fr;grid-template-rows:255px 255px}
.gallery.g3 button:first-child{grid-row:1/3}
.gallery.g2{grid-template-columns:1.35fr .65fr;grid-template-rows:420px}
.gallery.g1{grid-template-columns:1fr;grid-template-rows:440px}
.gallery button{border:0;padding:0;overflow:hidden;cursor:zoom-in;background:#ddd6c8;border-radius:20px}
.gallery img{width:100%;height:100%;object-fit:cover;display:block}
.caption-line{margin:13px 0 0;color:var(--muted);font-size:12px}
/* Review pulse */
.review-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.review{padding:24px;border-top:4px solid var(--gold);background:var(--cream);border-radius:0 0 18px 18px;box-shadow:0 10px 32px rgba(23,48,46,.07)}
.review:nth-child(2){border-color:var(--coral)}
.review:nth-child(3){border-color:#8bb5a4}
.review-label{text-transform:uppercase;letter-spacing:.12em;font-size:11px;font-weight:600;color:var(--muted)}
.review p{margin:9px 0 0}
.source-note{margin-top:16px;font-size:12px;color:var(--muted)}
/* Practical strip */
.practical{display:grid;grid-template-columns:repeat(3,1fr);border-block:1px solid var(--line)}
.practical>div{padding:24px 24px 24px 0}
.practical>div+div{border-left:1px solid var(--line);padding-left:24px}
.practical small{display:block;text-transform:uppercase;letter-spacing:.12em;font-size:11px;margin-bottom:6px;color:var(--muted)}
.practical strong{font:500 22px var(--serif)}
/* Nearby */
.nearby{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.nearby a{display:block;position:relative;min-height:215px;padding:22px;text-decoration:none;color:#fff;overflow:hidden;background:var(--green);border-radius:20px}
.nearby img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.nearby a::after{content:"";position:absolute;inset:0;background:linear-gradient(transparent 35%,rgba(9,34,34,.85))}
.nearby span{position:absolute;z-index:1;left:22px;right:22px;bottom:18px;font:500 24px var(--serif)}
.nearby small{position:absolute;z-index:1;left:22px;bottom:52px;text-transform:uppercase;letter-spacing:.14em;font-size:10px;color:rgba(255,255,255,.85)}
/* Prev / next */
.stepper{display:flex;justify-content:space-between;gap:14px;margin:0 0 72px}
.stepper a{flex:1;text-decoration:none;border:1px solid var(--line);background:rgba(255,255,255,.5);border-radius:18px;padding:18px 20px;transition:.2s ease}
.stepper a:hover{background:#fff}
.stepper a:last-child{text-align:right}
.stepper small{display:block;text-transform:uppercase;letter-spacing:.13em;font-size:11px;color:var(--muted);margin-bottom:4px}
.stepper strong{font:500 20px var(--serif)}
/* Footer */
.footer{padding:34px 0 48px;color:var(--muted);font-size:13px;border-top:1px solid var(--line)}
.footer .shell{display:flex;justify-content:space-between;gap:24px;flex-wrap:wrap;padding-top:0}
.footer strong{color:var(--ink)}
/* Lightbox */
dialog{border:0;padding:0;background:#0c2623;color:#fff;width:min(1180px,calc(100% - 32px));max-width:none;border-radius:22px;box-shadow:0 35px 120px rgba(0,0,0,.4)}
dialog::backdrop{background:rgba(7,27,25,.78);backdrop-filter:blur(7px)}
.lightbox-img{width:100%;height:min(72vh,740px);object-fit:contain;display:block;background:#0c2623}
.lightbox-bar{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:14px 18px}
.lightbox-bar button{border:1px solid rgba(255,255,255,.45);color:#fff;background:transparent;border-radius:999px;padding:9px 14px;cursor:pointer}
.lightbox-text{min-width:0}
.lightbox-text strong{display:block}
.lightbox-text span{color:rgba(255,255,255,.65);font-size:12px}
/* Missing */
.missing{min-height:70vh;display:grid;place-items:center;text-align:center;padding:30px}
.missing h1{font:500 56px var(--serif);margin:8px 0 0}
.missing a{display:inline-block;margin-top:22px}
@media(prefers-reduced-motion:no-preference){
  html{scroll-behavior:smooth}
  .pill:hover,.action:hover,.stepper a:hover{transform:translateY(-1px)}
  .gallery img{transition:transform .5s ease}
  .gallery button:hover img{transform:scale(1.03)}
}
@media(max-width:900px){
  .shell{width:min(100% - 32px,760px)}
  .hero{min-height:480px}
  .hero-inner{padding:100px 0 52px}
  .intro-grid,.review-grid,.nearby,.practical{grid-template-columns:1fr}
  .practical>div{padding:18px 0}
  .practical>div+div{border-left:0;border-top:1px solid var(--line);padding-left:0}
  .section-head{display:block}
  .section-head p{margin-top:10px}
  .gallery.g3{grid-template-columns:1fr 1fr;grid-template-rows:300px 170px}
  .gallery.g3 button:first-child{grid-column:1/3;grid-row:auto}
  .gallery.g2{grid-template-columns:1fr;grid-template-rows:300px 220px}
  .stepper{flex-direction:column}
  .stepper a:last-child{text-align:left}
}
@media(max-width:600px){
  .shell{width:calc(100% - 28px)}
  .topbar .brand{font-size:16px}
  main .shell{padding-top:44px}
  .section{margin-bottom:52px}
}
@media print{
  .topbar,.actions,.nearby,.stepper,dialog{display:none!important}
  body{background:#fff}
  .hero{min-height:340px}
}

 <main><div class="shell">
 <section class="intro-grid"><div><p class="eyebrow" style="color:var(--coral)">Why it earns its place</p><p class="lead">${esc(place.why)}</p>${place.rating?`<div class="chips"><span class="chip rating">${esc(place.rating)}</span></div>`:''}<div class="actions"><a class="action primary" href="${place.map}" target="_blank" rel="noopener">Google Maps & reviews ↗</a><a class="action" href="${ta}" target="_blank" rel="noopener">Tripadvisor ↗</a><a class="action" href="${place.site}" target="_blank" rel="noopener">Official information ↗</a></div></div><aside class="family-note"><strong>The family lens</strong>${esc(place.family)}</aside></section>
 <section class="section"><div class="section-head"><h2>See the place</h2><p>Open any photograph full screen. Sunrise and sunset stops are shown in the light you will actually find them in.</p></div><div class="gallery g${photos.length}">${photos.map((src,i)=>`<button type="button" data-photo="${i}" aria-label="Open photograph ${i+1} of ${esc(place.t)}"><img loading="${i?'lazy':'eager'}" src="${src}" alt="${esc(place.t)} photograph ${i+1}"></button>`).join('')}</div><p class="caption-line">Photography: Wikimedia Commons contributors and the trip’s curated image set; individual licences remain with each creator.</p></section>
 <section class="section"><div class="section-head"><h2>Review pulse</h2><p>Paraphrased themes from public visitor feedback, checked 11 July 2026 — not promotional quotes.</p></div><div class="review-grid"><article class="review"><span class="review-label">What people love</span><p>${esc(place.love)}</p></article><article class="review"><span class="review-label">Worth knowing</span><p>${esc(place.know)}</p></article><article class="review"><span class="review-label">Our best move</span><p>${esc(place.move)}</p></article></div><p class="source-note">Ratings and hours change — open the live listing above before relying on either.</p></section>
 <section class="section"><div class="practical"><div><small>Allow</small><strong>${esc(place.visit)}</strong></div><div><small>Best moment</small><strong>${esc(place.best)}</strong></div><div><small>In your week</small><strong>${esc(place.day)}</strong></div></div></section>
 <section class="section"><div class="section-head"><h2>Continue nearby</h2><p>The places that naturally belong to the same part of the day.</p></div><div class="nearby">${place.near.map(n=>`<a href="?place=${n}"><img loading="lazy" src="${base[n].hero}" alt=""><small>${esc(base[n].day)}</small><span>${esc(base[n].t)} →</span></a>`).join('')}</div></section>
 <nav class="stepper" aria-label="Previous and next stop">${prev?`<a href="?place=${prev}"><small>← Previous stop</small><strong>${esc(base[prev].t)}</strong></a>`:'<span></span>'}${next?`<a href="?place=${next}"><small>Next stop →</small><strong>${esc(base[next].t)}</strong></a>`:''}</nav>
 </div>
 <footer class="footer"><div class="shell"><div><strong>Lisbon, shared slowly</strong><br>Chris · Tash · Mia & Lily · 18–23 July 2026</div><div>Part of the family itinerary — <a href="index.html">back to the full week</a>.</div></div></footer></main>`;
 const dialog=document.getElementById('lightbox'),large=document.getElementById('lightbox-image'),count=document.getElementById('lightbox-count'),title=document.getElementById('lightbox-title');
 let current=0;
 const show=i=>{current=(i+photos.length)%photos.length;large.src=photos[current];large.alt=place.t+' photograph '+(current+1);title.textContent=place.t;count.textContent='Image '+(current+1)+' of '+photos.length};
 app.querySelectorAll('[data-photo]').forEach(b=>b.addEventListener('click',()=>{show(Number(b.dataset.photo));dialog.showModal()}));
 document.getElementById('lightbox-prev').addEventListener('click',()=>show(current-1));
 document.getElementById('lightbox-next').addEventListener('click',()=>show(current+1));
 document.getElementById('lightbox-close').addEventListener('click',()=>dialog.close());
 dialog.addEventListener('click',e=>{if(e.target===dialog)dialog.close()});
 document.addEventListener('keydown',e=>{if(!dialog.open)return;if(e.key==='ArrowLeft')show(current-1);if(e.key==='ArrowRight')show(current+1)});
}
</script>
</body>
</html>
